<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>3D Projectile Target Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, sans-serif;
            background: radial-gradient(circle at top, #1b2a4e, #0b1020);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;

            overflow-x: hidden;
            overflow-y: auto;
        }

        .game {
            width: 1200px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 15px;
            position: relative;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        input,
        select {
            padding: 6px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            width: 80px;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(135deg, #0072ff, #00c6ff);
        }

        #game3d {
            width: 100%;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .stats {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }

        .math-box {
            margin-top: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.45);
            border-radius: 12px;
            border-left: 5px solid #00c6ff;
        }

        label {
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="game">
        <h2>🎯 3D Projectile Target Game : Upgraded</h2>

        <div class="controls">
            <label>Velocity</label> <input id="velocity" value="30" type="number" oninput="updatePrediction()">
            <label>Angle</label> <input id="angle" value="45" type="number" oninput="updatePrediction()">
            <label>Mode</label>
            <select id="targetMode" onchange="toggleMode()">
                <option value="static">Static</option>
                <option value="moving">Moving</option>
            </select>
            <button onclick="launch()">🚀 Launch</button>
            <button onclick="autoSolve()">🧮 Auto Solve</button>
            <button onclick="newTarget()">🎯 New Target</button>
        </div>

        <div id="game3d">
            <div id="overlay">HIT!</div>
        </div>

        <div class="stats">
            <div>
                Height: <span id="height">0</span> m |
                Range: <span id="range">0</span> m |
                Target: <span id="targetDist">0</span> m
            </div>
            <div style="font-weight:bold; color:#00ffcc; font-size:18px;">
                Score: <span id="score">0</span>
            </div>
        </div>

        <div class="math-box">
            <h3 style="margin-top:0">Physics Derivation</h3>
            <div id="mathSteps">Click Auto Solve to view steps</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let projectile, target, cannon;
        const g = 9.81;
        let clock = new THREE.Clock();

        // State
        let animating = false;
        let cameraFollow = false;
        let score = 0;
        let isMovingTarget = false;
        let targetDistance = 80; // Base distance for target
        let targetTime = 0;      // Time phase for sine wave mapping
        let shakeTime = 0;
        let projVel = new THREE.Vector3(); // Delta-time driven velocity vector

        // Optimized Trail System (Phase 1)
        const MAX_TRAIL_POINTS = 100;
        let trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
        let trailLine;
        let trailCount = 0;

        // Prediction Arc System (Phase 1)
        const MAX_PREDICT_POINTS = 150;
        let predictPositions = new Float32Array(MAX_PREDICT_POINTS * 3);
        let predictionLine;

        // Particle System Pool (Phase 1)
        const MAX_PARTICLES = 80;
        let particles = [];

        init();
        animate();

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2639);
            scene.fog = new THREE.Fog(0x1a2639, 100, 300);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(75, 1200 / 450, 0.1, 1000);
            camera.position.set(-40, 25, 80);

            // Renderer Setup (Phase 3: Shadows)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(1200, 450);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById("game3d").appendChild(renderer.domElement);

            // Lighting Upgrade (Phase 3: Hemisphere + Shadows)
            let hemiLight = new THREE.HemisphereLight(0xe8f0ff, 0x444444, 0.6);
            scene.add(hemiLight);

            let dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            scene.add(dirLight);

            // Ground
            let groundGeo = new THREE.PlaneGeometry(800, 800);
            let groundMat = new THREE.MeshStandardMaterial({ color: 0x2d7f2d, roughness: 0.8, metalness: 0.2 });
            let ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Cannon
            let cannonGeo = new THREE.CylinderGeometry(2, 2, 20);
            let cannonMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.4 });
            cannon = new THREE.Mesh(cannonGeo, cannonMat);
            cannon.rotation.z = Math.PI / 2;
            cannon.position.set(0, 2, 0);
            cannon.castShadow = true;
            scene.add(cannon);

            // Projectile Enhancement (Phase 3: Emissive Glow)
            let projGeo = new THREE.SphereGeometry(1.5, 32, 32);
            let projMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffaa00, emissiveIntensity: 0.5 });
            projectile = new THREE.Mesh(projGeo, projMat);
            projectile.position.set(0, 3, 0);
            projectile.castShadow = true;
            scene.add(projectile);

            // Target
            let targetGeo = new THREE.TorusGeometry(4, 1, 16, 100);
            let targetMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 });
            target = new THREE.Mesh(targetGeo, targetMat);
            target.castShadow = true;
            target.position.y = 5;
            scene.add(target);

            // Optimized Trail System Initialisation (Phase 1)
            let trailGeo = new THREE.BufferGeometry();
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            let trailMat = new THREE.LineBasicMaterial({ color: 0xffcc00, linewidth: 2, transparent: true, opacity: 0.8 });
            trailLine = new THREE.Line(trailGeo, trailMat);
            scene.add(trailLine);

            // Predictive Arc Initialisation (Phase 1)
            let predictGeo = new THREE.BufferGeometry();
            predictGeo.setAttribute('position', new THREE.BufferAttribute(predictPositions, 3));
            let predictMat = new THREE.LineDashedMaterial({ color: 0x00ffff, dashSize: 2, gapSize: 2, transparent: true, opacity: 0.5 });
            predictionLine = new THREE.Line(predictGeo, predictMat);
            scene.add(predictionLine);

            // Particle System Pool Setup (Phase 1)
            let partGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
            let partMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff8800, transparent: true });
            for (let i = 0; i < MAX_PARTICLES; i++) {
                let p = new THREE.Mesh(partGeo, partMat.clone());
                p.visible = false;
                scene.add(p);
                particles.push({ mesh: p, velocity: new THREE.Vector3(), life: 0 });
            }

            newTarget();
            updatePrediction();
        }

        function toggleMode() {
            let mode = document.getElementById("targetMode").value;
            isMovingTarget = (mode === "moving");
            targetTime = 0;
            target.position.set(targetDistance, 5, 0); // Recentralize Target
        }

        // Trajectory Prediction (Phase 1)
        function updatePrediction() {
            let v = parseFloat(document.getElementById("velocity").value) || 0;
            let a = (parseFloat(document.getElementById("angle").value) || 0) * Math.PI / 180;

            // Starts prediction from spawn location
            let pos = new THREE.Vector3(0, 3, 0);
            let vel = new THREE.Vector3(v * Math.cos(a), v * Math.sin(a), 0);

            let simDelta = 0.05; // Accurate simulation step size computation
            let idx = 0;

            while (idx < MAX_PREDICT_POINTS) {
                predictPositions[idx * 3] = pos.x;
                predictPositions[idx * 3 + 1] = pos.y;
                predictPositions[idx * 3 + 2] = pos.z;

                // Mimic physics engine integration accurately
                pos.addScaledVector(vel, simDelta);
                vel.y -= g * simDelta;
                idx++;

                if (pos.y < -1) break; // Break simulation past ground level
            }

            predictionLine.geometry.setDrawRange(0, idx);
            predictionLine.geometry.attributes.position.needsUpdate = true;
            predictionLine.computeLineDistances(); // Required rendering step for line dashed material
        }

        function newTarget() {
            resetProjectile();
            targetDistance = 50 + Math.random() * 120;
            target.position.set(targetDistance, 5, 0);
            targetTime = 0;

            document.getElementById("targetDist").innerText = targetDistance.toFixed(2);

            updatePrediction();
        }

        function resetProjectile() {
            animating = false;
            cameraFollow = false;
            projectile.position.set(0, 3, 0);
            projVel.set(0, 0, 0);
            trailCount = 0;
            trailLine.geometry.setDrawRange(0, 0);
            document.getElementById("height").innerText = "0";
            document.getElementById("range").innerText = "0";
        }

        function autoSolve() {
            if (isMovingTarget) {
                alert("⚠️ Auto Solve is designed for Static targets! Switch mode to use effectively.");
                return;
            }
            let u = Math.sqrt(targetDistance * g);
            document.getElementById("velocity").value = u.toFixed(2);
            document.getElementById("angle").value = 45;

            let steps = `R = (u² sin 2θ) / g <br><br>θ = 45° → sin 90° = 1 <br><br>R = u² / g <br><br>u² = R × g <br><br>u = √(${targetDistance.toFixed(2)} × 9.81) <br><br><b>u ≈ ${u.toFixed(2)} m/s</b>`;
            document.getElementById("mathSteps").innerHTML = steps;

            updatePrediction(); // Automatically draw Arc on solve.
        }

        function launch() {
            let v = parseFloat(document.getElementById("velocity").value);
            let a = parseFloat(document.getElementById("angle").value) * Math.PI / 180;

            resetProjectile();
            projVel.set(v * Math.cos(a), v * Math.sin(a), 0);

            animating = true;
            cameraFollow = true;
        }

        function updateTrail() {
            // Optimized buffer shifting behavior limits garbage-collection drops
            trailPositions.copyWithin(3, 0, (MAX_TRAIL_POINTS - 1) * 3);
            trailPositions[0] = projectile.position.x;
            trailPositions[1] = projectile.position.y;
            trailPositions[2] = projectile.position.z;

            if (trailCount < MAX_TRAIL_POINTS) trailCount++;
            trailLine.geometry.setDrawRange(0, trailCount);
            trailLine.geometry.attributes.position.needsUpdate = true;
        }

        // Particle System Exploison Execution (Phase 1)
        function triggerExplosion(pos) {
            let spawned = 0;
            for (let i = 0; i < MAX_PARTICLES; i++) {
                let p = particles[i];
                if (!p.mesh.visible) { // Pool available
                    p.mesh.position.copy(pos);
                    // Add explosive trajectory with base vertical thrust
                    let dir = new THREE.Vector3(Math.random() - 0.5, Math.random(), Math.random() - 0.5).normalize();
                    let speed = 10 + Math.random() * 25;
                    p.velocity.copy(dir).multiplyScalar(speed);
                    p.life = 1.0;
                    p.mesh.visible = true;
                    p.mesh.material.opacity = 1.0;
                    spawned++;
                    if (spawned >= 40) break; // Limit instance activation count
                }
            }
        }

        function handleHitMiss(isHit = false) {
            animating = false;

            if (isHit) {
                score += 10;
                document.getElementById("score").innerText = score;
                showOverlay("HIT!", "#00ffcc");
                triggerExplosion(target.position.clone());
                shakeTime = 0.35;
            } else {
                showOverlay("MISS", "#ff3333");
                triggerExplosion(projectile.position.clone());
                shakeTime = 0.15;
                setTimeout(() => cameraFollow = false, 1500);
                return;
            }

            setTimeout(() => { cameraFollow = false; newTarget(); }, 2000);
        }

        function showOverlay(text, color) {
            let overlay = document.getElementById("overlay");
            overlay.innerText = text;
            overlay.style.color = color;
            overlay.style.transition = "none";
            overlay.style.opacity = 1.0;
            overlay.style.transform = "translate(-50%, -50%) scale(1.3)";

            // Animation scheduling mapping
            requestAnimationFrame(() => {
                overlay.style.transition = "all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                overlay.style.opacity = 0;
                overlay.style.transform = "translate(-50%, -70%) scale(1)";
            });
        }

        // Master App Update loop
        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            delta = Math.min(delta, 0.1); // Engine clamping limits jumps

            // Dynamic Target Phase updating (Phase 2)
            if (isMovingTarget) {
                targetTime += delta;
                let amplitude = 20;
                let speed = 1.5;
                target.position.x = targetDistance + Math.sin(targetTime * speed) * amplitude;
            }

            // Projectile Physics integration updating
            if (animating) {
                projectile.position.addScaledVector(projVel, delta);
                projVel.y -= g * delta;
                updateTrail();
                // ✅ REAL-TIME COLLISION DETECTION
                let distance = projectile.position.distanceTo(target.position);

                if (distance < 6.0) {
                    handleHitMiss(true); // pass HIT
                    return;
                }

                if (projectile.position.y >= 0) {
                    document.getElementById("height").innerText = projectile.position.y.toFixed(2);
                    document.getElementById("range").innerText = projectile.position.x.toFixed(2);
                }

                // Detect terminal condition
                if (projectile.position.y < 0) {
                    projectile.position.y = 0;
                    handleHitMiss(false);
                }
            }

            // Engine Particle Lifecycle updates
            for (let i = 0; i < MAX_PARTICLES; i++) {
                let p = particles[i];
                if (p.mesh.visible) {
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.velocity.y -= g * delta; // Environmental gravity scaling
                    p.life -= delta * 1.5;
                    if (p.life <= 0) {
                        p.mesh.visible = false;
                    } else {
                        p.mesh.material.opacity = p.life;
                    }
                }
            }

            // Phase 3: Gamefeel Cinematic Camera 
            let idealLookAt = new THREE.Vector3(50, 0, 0);
            let idealPos = new THREE.Vector3(-40, 25, 80);

            if (cameraFollow) {
                idealPos.copy(projectile.position).add(new THREE.Vector3(-15, 15, 35));
                idealLookAt.copy(projectile.position);
            }

            // Mathematical Exponential interpolation eliminates framerate disparities
            let camSpeed = cameraFollow ? 4.0 : 2.0;
            let alpha = 1.0 - Math.exp(-camSpeed * delta);
            camera.position.lerp(idealPos, alpha);

            // Mathematical Screen Shake (Game Feel)
            if (shakeTime > 0) {
                camera.position.x += (Math.random() - 0.5) * 2;
                camera.position.y += (Math.random() - 0.5) * 2;
                shakeTime -= delta;
            }

            camera.lookAt(idealLookAt);
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
